    <div class="w-full h-48 p-2 flex items-center justify-center">
        <div class="skeleton w-full h-full rounded-md"></div>
    </div>

    <!-- Nội dung -->
    <div class="p-3 text-center">
        <div class="skeleton w-3/4 h-4 mx-auto mb-2 rounded"></div>

        <div class="skeleton w-1/3 h-4 mx-auto mb-3 rounded"></div>

    </div>
</div>
